services:
  db:
    x-defang-postgres: true
    image: postgres:17
    environment:
      POSTGRES_DB: flyer_watch
      POSTGRES_USER: flyer_watch
      POSTGRES_PASSWORD:
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flyer_watch -d flyer_watch"]
      interval: 10s
      timeout: 5s
      retries: 5

  release:
    restart: no
    build:
      context: .
      target: runtime
    command: ["node", "packages/core/dist/init-db.js"]
    environment:
      DATABASE_URL: postgres://flyer_watch:${POSTGRES_PASSWORD}@db:5432/flyer_watch?uselibpqcompat=true&sslmode=${SSLMODE}
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      target: runtime
    command: ["pnpm", "--filter", "@flyer-watch/web", "start"]
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://flyer_watch:${POSTGRES_PASSWORD}@db:5432/flyer_watch?uselibpqcompat=true&sslmode=${SSLMODE}
      PUBLIC_BASE_URL: https://flyerping.click
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-prod}
      CONSENTKEYS_ISSUER_URL: https://api.consentkeys.com
      CONSENTKEYS_CLIENT_ID: ck_5131645b3a16ae98fad3c5f61daaa0f1
      CONSENTKEYS_CLIENT_SECRET:
    depends_on:
      release:
        condition: service_completed_successfully

  worker:
    x-defang-llm: true
    build:
      context: .
      target: runtime
    command: ["node", "apps/worker/dist/index.js"]
    environment:
      DATABASE_URL: postgres://flyer_watch:${POSTGRES_PASSWORD}@db:5432/flyer_watch?uselibpqcompat=true&sslmode=${SSLMODE}
      MAIL_FROM: ${MAIL_FROM:-alerts@flyerping.click}
      SMTP_HOST: email-smtp.us-east-1.amazonaws.com
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: AKIAST4UKDUZVVH4CPS5
      SMTP_PASSWORD:
      SMTP_SECURE: ${SMTP_SECURE:-false}
      VISION_BASE_URL: ${VISION_BASE_URL:-http://ai_runner/v1}
      VISION_MODEL: ${VISION_MODEL:-qwen.qwen3-vl-235b-a22b}
      VISION_API_KEY: ${VISION_API_KEY:-bedrock}
      WORKER_SWEEP_HOURS: ${WORKER_SWEEP_HOURS:-6}
    depends_on:
      ai_runner:
        condition: service_started
      release:
        condition: service_completed_successfully

  ai_runner:
    provider:
      type: model
      options:
        model: qwen.qwen3-vl-235b-a22b
    environment:
      USE_MODEL_MAPPING: "false"
    x-defang-llm: true

volumes:
  pgdata:
