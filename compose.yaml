services:
  db:
    x-defang-postgres: true
    image: postgres:17
    environment:
      POSTGRES_DB: flyer_watch
      POSTGRES_USER: flyer_watch
      POSTGRES_PASSWORD:
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flyer_watch -d flyer_watch"]
      interval: 10s
      timeout: 5s
      retries: 5

  release:
    build:
      context: .
      target: runtime
    command: ["node", "packages/core/dist/init-db.js"]
    environment:
      DATABASE_URL: postgres://flyer_watch:${POSTGRES_PASSWORD}@db:5432/flyer_watch
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      target: runtime
    command: ["pnpm", "--filter", "@flyer-watch/web", "start"]
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://flyer_watch:${POSTGRES_PASSWORD}@db:5432/flyer_watch
      PUBLIC_BASE_URL: https://flyerping.click
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-prod}
      CONSENTKEYS_ISSUER_URL: https://api.consentkeys.com
      CONSENTKEYS_CLIENT_ID: ck_5131645b3a16ae98fad3c5f61daaa0f1
      CONSENTKEYS_CLIENT_SECRET:
    depends_on:
      release:
        condition: service_completed_successfully

  worker:
    x-defang-llm: true
    build:
      context: .
      target: runtime
    command: ["node", "apps/worker/dist/index.js"]
    environment:
      DATABASE_URL: postgres://flyer_watch:${POSTGRES_PASSWORD}@db:5432/flyer_watch
      AWS_REGION: ${AWS_REGION:-us-east-1}
      SES_FROM_EMAIL: alerts@flyerping.click
      # VISION_API_KEY: ${VISION_API_KEY:-dmr-local}
      WORKER_SWEEP_HOURS: ${WORKER_SWEEP_HOURS:-6}
    depends_on:
      release:
        condition: service_completed_successfully
    models:
      sungiven-vision:
        endpoint_var: VISION_BASE_URL
        model_var: VISION_MODEL

models:
  sungiven-vision:
    model: ai/qwen3-vl:4B-UD-Q4_K_XL
    context_size: 16384

volumes:
  pgdata:
